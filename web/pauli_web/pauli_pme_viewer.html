<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>WebGL Pauli STM Viewer - Phase 0</title>
    <style>
      body {
        margin: 0;
        font-family: sans-serif;
        background: #111;
        color: #eee;
        height: 100vh;
        display: flex;
        flex-direction: row;
      }
      #leftPanel {
        flex: 0 0 512px;
        display: flex;
        flex-direction: column;
      }
      #container {
        width: 512px;
        height: 512px;
        background: #000;
      }
      #cpuScanPanel {
        width: 512px;
        padding: 4px;
        box-sizing: border-box;
      }
      #ui {
        flex: 0 0 340px;
        padding: 8px;
        box-sizing: border-box;
        overflow: auto;
        border-left: 1px solid #333;
      }
      .row { margin-bottom: 6px; }
      label { display: inline-block; width: 80px; }
      input[type="number"] { width: 80px; }
      button { margin: 2px 0; }
    </style>
    <!-- Use a newer Three.js build (0.150.1) from unpkg that exposes global THREE and supports WebGL2/GLSL3 -->
    <script src="https://unpkg.com/three@0.150.1/build/three.min.js"></script>
    <!-- Lightweight plotting library for CPU line-scan debug -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Generic PME GUI utilities (param specs, GUI generation, param I/O) -->
    <script src="pme_gui_utils.js"></script>
    <!-- CPU-side PME solver for single-point debug -->
    <script src="pauli_pme_cpu.js"></script>
  </head>
  <body>
    <div id="leftPanel">
      <div id="container"></div>
      <div id="cpuScanPanel">
        <div class="row"><label for="inpLineScanPoints">CPU scan pts</label> <input id="inpLineScanPoints" type="number" min="2" step="1" value="20" /> <button id="btnCpuScan">Run CPU line scan</button></div>
        <div class="row"><canvas id="cpuLineScanCanvas" style="width:100%; height:180px;"></canvas></div>
      </div>
    </div>
    <div id="ui">
      <div id="paramPanel"></div>
      <div class="row"><label for="selMode">Mode         </label>
        <select id="selMode">
          <option value="0" selected>Single-particle min(E_i)</option>
          <option value="1">Many-body ground-state E</option>
          <option value="2">Ground-state tip current (proxy)</option>
          <option value="3">PME: occupancy of site</option>
          <option value="4">PME: total charge</option>
          <option value="5">PME: tip current</option>
          <option value="6">DEBUG: Es[0]</option>
          <option value="7">DEBUG: rho[0]</option>
          <option value="8">DEBUG: sum rho</option>
          <option value="9">DEBUG: K[idx]</option>
          <option value="10">DEBUG: rhs[idx]</option>
        </select>
      </div>
      <div class="row"><label for="inpSiteIndex">site idx    </label> <input id="inpSiteIndex" type="number" min="0" step="1" value="0" /></div>
      <div class="row"><button id="btnUpdate">Update view</button></div>
      <div class="row"><label for="txtSites">Sites (x y z E)</label></div>
      <div class="row">
        <textarea id="txtSites" spellcheck="false" style="width: 100%; height: 120px;">
-5.7850  0.0000  0.0000  -0.1000
 5.7850  0.0000  0.0000  -0.1000
 0.0000 -7.5200  0.0000  -0.1080
 0.0000  7.5200  0.0000  -0.1080
        </textarea>
      </div>
      <div class="row">
        <button id="btnApplySites">Apply sites</button>
      </div>
      <div class="row" id="status"></div>
      <div class="row" style="font-size: 0.8em; color: #aaa;">
        Phase 1: gradient + visualization of site positions/energies. No PME physics yet.
      </div>
    </div>

    <script>
      var renderer, scene, camera, mesh, material;
      var cpuLineScanChart = null;

      // Parameter specifications for PME controls (similar to param_specs in GUITemplate).
      // Each entry links to a numeric input and a uniform. GUI widgets are generated programmatically.
      var paramSpecs = [
        { uniform: 'uNSites',   inputId: 'inpNSites', label: 'nsites',     type: 'int',   def: 2,   min: 1, max: 4 },
        { uniform: 'uL',        inputId: 'inpL',      label: 'L (Å)',      type: 'float', def: 20.0 },
        { uniform: 'uZTip',     inputId: 'inpZTip',   label: 'z_tip (Å)',  type: 'float', def: 8.0 },
        { uniform: 'uVBias',    inputId: 'inpVBias',  label: 'VBias (V)',  type: 'float', def: 0.3 },
        { uniform: 'uRtip',     inputId: 'inpRTip',   label: 'Rtip (Å)',   type: 'float', def: 4.0,  min: 0.1 },
        { uniform: 'uTemp',     inputId: 'inpTemp',   label: 'Temp (K)',   type: 'float', def: 3.0,  min: 0.0 },
        { uniform: 'uGammaS',   inputId: 'inpGammaS', label: 'GammaS',     type: 'float', def: 0.01, min: 0.0 },
        { uniform: 'uGammaT',   inputId: 'inpGammaT', label: 'GammaT',     type: 'float', def: 0.01, min: 0.0 },
        { uniform: 'uDecay',    inputId: 'inpDecay',  label: 'decay',      type: 'float', def: 0.3,  min: 0.0 },
        { uniform: 'uW',        inputId: 'inpW',      label: 'W (Coul)',   type: 'float', def: 0.0 },
        { uniform: 'uEcenter',  inputId: 'inpEcenter',label: 'E center',   type: 'float', def: 0.0 },
        { uniform: 'uEscale',   inputId: 'inpEscale', label: 'E scale',    type: 'float', def: 10.0, min: 0.05 }
      ];

      var paramInputIds = paramSpecs.map(function (s) { return s.inputId; });

      // Uniforms: special ones explicit, parameter uniforms derived from paramSpecs.
      var uniforms = {
        uResolution: { value: new THREE.Vector2(512, 512) },
        uMode:       { value: 0 },
        uSiteIndex:  { value: 0 },
        // Sites: up to 4 sites, each as (x, y, z, E)
        uSites:      { value: [
          new THREE.Vector4(0, 0, 0, -0.1),
          new THREE.Vector4(0, 0, 0, -0.1),
          new THREE.Vector4(0, 0, 0, -0.1),
          new THREE.Vector4(0, 0, 0, -0.1)
        ] }
      };

      for (var i = 0; i < paramSpecs.length; i++) {
        var s = paramSpecs[i];
        uniforms[s.uniform] = { value: s.def };
      }

      function setStatus(msg) {
        var el = document.getElementById('status');
        if (el) el.textContent = msg;
      }

      function init() {
        var container = document.getElementById('container');

        scene  = new THREE.Scene();
        camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 10);
        camera.position.z = 1;

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);

        uniforms.uResolution.value.set(renderer.domElement.width, renderer.domElement.height);

        var vertexShaderSrc = [
          'out vec2 vUv;',
          'void main() {',
          '  vUv = uv;',
          '  gl_Position = vec4(position, 1.0);',
          '}'
        ].join('\n');

        // Load fragment shader from external file (Phase 1 shader)
        fetch('Pauli_PME_phase1.glslf')
          .then(function (r) { return r.text(); })
          .then(function (fragSource) {
            material = new THREE.ShaderMaterial({
              uniforms: uniforms,
              vertexShader: vertexShaderSrc,
              fragmentShader: fragSource,
              glslVersion: THREE.GLSL3
            });

            var geom = new THREE.PlaneGeometry(2, 2);
            mesh     = new THREE.Mesh(geom, material);
            scene.add(mesh);

            window.addEventListener('resize', onWindowResize, false);

            document.getElementById('btnUpdate').addEventListener('click', function () {
              updateFromInputs();
              applySitesFromTextarea();
            });
            document.getElementById('btnApplySites').addEventListener('click', function () {
              applySitesFromTextarea();
            });

            var btnCpuScan = document.getElementById('btnCpuScan');
            if (btnCpuScan) {
              btnCpuScan.addEventListener('click', function () {
                runCpuLineScan();
              });
            }

            // Generate parameter GUI from spec
            createPmeGui('paramPanel', 'Pauli STM Viewer (Phase 1: sites + geometry)', paramSpecs);

            // Numeric inputs: re-render on change
            paramInputIds.concat(['inpSiteIndex']).forEach(function (id) {
              var el = document.getElementById(id);
              if (!el) return;
              el.addEventListener('input', function () {
                updateFromInputs();
                // Do not re-parse sites on every numeric input to keep it predictable
              });
            });

            // Mode selector: change render mode without re-parsing sites
            var selMode = document.getElementById('selMode');
            if (selMode) {
              selMode.addEventListener('change', function () {
                updateFromInputs();
              });
            }

            // Mouse-wheel increment on numeric inputs (similar to ppafm_web/index.html)
            function attachWheelIncrement(id) {
              var el = document.getElementById(id);
              if (!el) return;
              el.addEventListener('wheel', function (ev) {
                ev.preventDefault();
                var step = parseFloat(el.step) || 1.0;
                var v    = parseFloat(el.value) || 0.0;
                var dir  = (ev.deltaY > 0) ? -1.0 : 1.0; // wheel up -> increase
                el.value = (v + dir * step).toString();
                updateFromInputs();
              });
            }

            paramInputIds.concat(['inpSiteIndex']).forEach(attachWheelIncrement);
            // Initialize uniforms from default inputs and site list
            updateFromInputs();
            applySitesFromTextarea();
          })
          .catch(function (e) {
            setStatus('Error loading fragment shader: ' + e);
          });
      }

      function onWindowResize() {
        var container = document.getElementById('container');
        if (!renderer) return;
        renderer.setSize(container.clientWidth, container.clientHeight);
        uniforms.uResolution.value.set(renderer.domElement.width, renderer.domElement.height);
        renderOnce();
      }

      function updateFromInputs() {
        // Read and clamp all parameter values from inputs using the shared spec.
        var p = readParamsFromInputsWithSpecs(paramSpecs);

        // Handle mode and site index separately.
        var siteIdx = parseInt(document.getElementById('inpSiteIndex').value, 10);
        var modeSel = document.getElementById('selMode');
        var Mode    = modeSel ? parseInt(modeSel.value, 10) : 0;
        if (!isFinite(siteIdx)) siteIdx = 0;
        if (!isFinite(Mode))    Mode    = 0;

        // Additional constraints that depend on other params.
        var nsites = p.uNSites;
        if (nsites < 1) nsites = 1;
        if (nsites > 4) nsites = 4;
        p.uNSites = nsites;

        if (siteIdx < 0) siteIdx = 0;
        if (siteIdx >= nsites) siteIdx = nsites - 1;

        // Apply to uniforms in bulk.
        applyParamsToUniformsWithSpecs(paramSpecs, uniforms, p);
        uniforms.uMode.value      = Mode;
        uniforms.uSiteIndex.value = siteIdx;

        var status = buildStatusStringFromParams(paramSpecs, p, Mode, siteIdx);
        setStatus(status);

        renderOnce();
      }

      function applySitesFromTextarea() {
        var txt = document.getElementById('txtSites').value || '';
        var lines = txt.split(/\r?\n/).map(function (l) { return l.trim(); }).filter(function (l) { return l.length > 0; });
        var maxSites = 4;
        var parsed = [];
        for (var i = 0; i < lines.length && parsed.length < maxSites; i++) {
          var parts = lines[i].split(/\s+/);
          if (parts.length < 4) continue;
          var x = parseFloat(parts[0]);
          var y = parseFloat(parts[1]);
          var z = parseFloat(parts[2]);
          var E = parseFloat(parts[3]);
          if (!isFinite(x) || !isFinite(y) || !isFinite(z) || !isFinite(E)) continue;
          parsed.push(new THREE.Vector4(x, y, z, E));
        }

        if (parsed.length === 0) {
          setStatus('No valid site lines parsed; keeping previous uSites');
          renderOnce();
          return;
        }

        // Update uNSites to the number of parsed sites, capped by 4
        uniforms.uNSites.value = Math.min(parsed.length, maxSites);

        // Fill remaining slots with dummy far-away sites so they do not contribute
        while (parsed.length < maxSites) {
          parsed.push(new THREE.Vector4(1e6, 1e6, 0.0, 0.0));
        }

        uniforms.uSites.value = parsed;
        setStatus('Parsed ' + uniforms.uNSites.value + ' sites from textarea');
        renderOnce();
      }

      function renderOnce() {
        if (!(renderer && scene && camera)) return;
        renderer.render(scene, camera);
      }

      init();
    </script>
  </body>
</html>
