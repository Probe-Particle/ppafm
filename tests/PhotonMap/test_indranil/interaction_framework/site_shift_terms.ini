# site_shift_terms.ini — Multi-term site-energy shift configuration
# Each term is optional; only those listed in [terms] enable= are computed.
# Default (if this file is not provided): Coulomb only.

[terms]
# Comma-separated list of enabled terms.
# Available: coulomb, exchange, polarization, ct
enable = coulomb, exchange

[exchange]
# Density Overlap Model for Pauli repulsion
# Ref: Amovilli & Mennucci, J. Phys. Chem. A 1997, 101, 2616-2622
# K_exch encodes the kinetic energy penalty of overlapping electrons
# Typical range: 5-10 eV·Bohr^3 for organic pi-conjugated molecules
# Can be fitted from SAPT decomposition of a reference dimer
k_exch_eV_bohr3 = 7.0

[polarization]
# Mutual Polarization / Induction Shift
# Ref: Stone, "The Theory of Intermolecular Forces", Oxford 2013, Ch.5
# Requires polarizability_tensor in electrostatics.ini per mol_id.
field_method = direct
# fd_step_bohr = 0.2
r_min_bohr = 0.5

[ct]
# Charge-Transfer Mixing / Superexchange
# Ref: Spano, Acc. Chem. Res. 2010, 43, 429-439
# model: orbital_overlap (uses HOMO/LUMO cubes), exp, table, or off
model = off
# k_ct_eV = 1.0
# E_CT_model = fixed
# E_CT_eV = 3.5
